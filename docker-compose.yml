version: "3.7"
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: estudiocontable-app
    container_name: estudiocontable-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - webnet

  web:
    image: nginx:alpine
    container_name: estudiocontable-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - webnet
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: estudiocontable-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-estudiocontable}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-laravel}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - webnet
    ports:
      - "3306:3306"

networks:
  webnet:
    driver: bridge

volumes:
  dbdata:
